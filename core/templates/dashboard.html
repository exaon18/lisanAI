<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LISAN - Learn & Play</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(180deg, #FF9500 0%, #FFB347 50%, #FFA500 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 100px;
            overflow-x: hidden;
            position: relative;
        }

        /* Decorative background elements */
        body::before {
            content: '';
            position: fixed;
            top: -50px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: 150px;
            left: -80px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 200, 100, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle star pattern background */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .star.small {
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
        }

        .star.medium {
            width: 9px;
            height: 9px;
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.7);
        }

        .star.large {
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }

        .floating-shape {
            position: absolute;
            opacity: 0.35;
            pointer-events: none;
        }

        .shape-circle {
            border: 3px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: float-slow 8s ease-in-out infinite;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }

        @keyframes float-slow {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-20px) translateX(10px); }
        }

        /* Header with user profile */
        .header {
            padding: 28px 24px;
            display: flex;
            align-items: flex-start;
            gap: 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.35) 0%, rgba(255, 255, 255, 0.2) 100%);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.4);
            position: relative;
            z-index: 10;
            border-radius: 0 0 28px 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .user-avatar {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            border: 4px solid rgba(255, 255, 255, 0.7);
            object-fit: cover;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.2) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 900;
            color: white;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            flex-shrink: 0;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            object-fit: cover;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            padding-top: 4px;
        }

        .header-text h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: white;
            text-shadow: 0 3px 10px rgba(0, 0, 0, 0.25);
            margin: 0;
            line-height: 1.2;
        }

        .header-text p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.98);
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-text p::before {
            content: '🎯';
            font-size: 16px;
        }

        /* Main container */
        .container {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .lesson-banner {
            width: 100%;
            max-width: 320px;
            background: linear-gradient(135deg, #FFFFFF 0%, #FFF5E6 100%);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 40px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15), inset 0 -2px 0 rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        .lesson-label {
            font-size: 11px;
            font-weight: 700;
            color: #FF9500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .lesson-title {
            font-family: 'Poppins', sans-serif;
            font-size: 22px;
            font-weight: 900;
            color: #333;
        }

        /* Winding Path Section */
        .path-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        .path-container {
            position: relative;
            width: 100%;
            max-width: 320px;
            height: 1400px;
            margin: 40px 0;
        }

        .path-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .levels-container {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .level-position {
            position: absolute;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Circular 3D Level Buttons */
        .level-btn-circle {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            position: relative;
            transition: all 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: translateY(0);
            box-shadow: 
                0 12px 0 rgba(200, 80, 0, 0.6),
                0 16px 28px rgba(0, 0, 0, 0.25),
                inset 0 -2px 6px rgba(255, 255, 255, 0.3),
                inset 0 2px 4px rgba(0, 0, 0, 0.2);
            text-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
            background: linear-gradient(180deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
            color: white;
            overflow: hidden;
        }

        .level-btn-circle::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 100%);
            border-radius: 50% 50% 0 0;
            pointer-events: none;
            z-index: 1;
        }

        .level-btn-circle:hover {
            transform: translateY(-6px) scale(1.08);
            box-shadow: 
                0 16px 0 rgba(200, 80, 0, 0.7),
                0 20px 32px rgba(0, 0, 0, 0.3),
                inset 0 -2px 6px rgba(255, 255, 255, 0.3),
                inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .level-btn-circle:active {
            transform: translateY(8px) scale(0.95);
            box-shadow: 
                0 4px 0 rgba(200, 80, 0, 0.6),
                0 8px 16px rgba(0, 0, 0, 0.2),
                inset 0 -2px 6px rgba(255, 255, 255, 0.3),
                inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .level-btn-circle.locked {
            background: linear-gradient(180deg, #999999 0%, #666666 50%, #444444 100%);
            opacity: 0.6;
            cursor: not-allowed;
        }

        .level-btn-circle.locked:hover {
            transform: translateY(0);
            box-shadow: 
                0 12px 0 rgba(50, 50, 50, 0.6),
                0 16px 28px rgba(0, 0, 0, 0.25),
                inset 0 -2px 6px rgba(255, 255, 255, 0.3),
                inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .level-number {
            font-size: 44px;
            position: relative;
            z-index: 2;
        }

        .level-btn-text {
            font-size: 10px;
            position: relative;
            z-index: 2;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            font-weight: 700;
        }

        .level-btn-circle.green {
            background: linear-gradient(180deg, #4FD66F 0%, #2EAC46 50%, #1E8C3A 100%);
            box-shadow: 
                0 12px 0 rgba(10, 60, 20, 0.8),
                0 16px 28px rgba(0, 0, 0, 0.25),
                inset 0 -2px 6px rgba(255, 255, 255, 0.3),
                inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .level-btn-circle.green:hover {
            box-shadow: 
                0 16px 0 rgba(10, 60, 20, 0.9),
                0 20px 32px rgba(0, 0, 0, 0.3),
                inset 0 -2px 6px rgba(255, 255, 255, 0.3),
                inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .level-btn-circle.blue {
            background: linear-gradient(180deg, #4FB3FF 0%, #1E90FF 50%, #0066CC 100%);
            box-shadow: 
                0 12px 0 rgba(0, 40, 100, 0.8),
                0 16px 28px rgba(0, 0, 0, 0.25),
                inset 0 -2px 6px rgba(255, 255, 255, 0.3),
                inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .level-btn-circle.blue:hover {
            box-shadow: 
                0 16px 0 rgba(0, 40, 100, 0.9),
                0 20px 32px rgba(0, 0, 0, 0.3),
                inset 0 -2px 6px rgba(255, 255, 255, 0.3),
                inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        /* Footer Navigation */
        .footer-nav {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.2) 100%);
            backdrop-filter: blur(40px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            height: 68px;
            padding: 0 20px;
            z-index: 20;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            width: auto;
            max-width: 280px;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.9);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 12px 18px;
            border-radius: 24px;
            position: relative;
            flex: 0 1 auto;
        }

        .nav-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
        }

        .nav-btn:active {
            transform: translateY(-1px) scale(0.95);
        }

        .nav-icon {
            font-size: 30px;
            position: relative;
            z-index: 1;
            line-height: 1;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }

        .nav-btn.active {
            color: white;
            background: rgba(255, 255, 255, 0.25);
        }

        /* Play Now Tooltip */
        .play-now-tooltip {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 250, 240, 0.95) 100%);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            border-radius: 24px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            font-weight: 700;
            font-size: 14px;
            color: #FF9500;
            white-space: nowrap;
            pointer-events: none;
            z-index: 5;
            animation: float-tooltip 2s ease-in-out infinite;
        }

        .play-now-tooltip::after {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 250, 240, 0.95) 100%);
            border-top: 2px solid rgba(255, 255, 255, 0.8);
            border-left: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 2px;
            rotate: 45deg;
        }

        @keyframes float-tooltip {
            0%, 100% { transform: translateX(-50%) translateY(0px); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        /* Game Modal Popup */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .game-modal {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 250, 245, 0.95) 100%);
            backdrop-filter: blur(40px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 40px;
            padding: 40px;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            transform: scale(0.8) translateY(30px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .game-modal {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .level-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #FF9500 0%, #FFB347 100%);
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            font-weight: 900;
            color: white;
            box-shadow: 0 12px 24px rgba(255, 149, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            margin-bottom: 20px;
            animation: pulse-badge 2s ease-in-out infinite;
        }

        @keyframes pulse-badge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .game-title {
            font-family: 'Poppins', sans-serif;
            font-size: 26px;
            font-weight: 900;
            color: #333;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .game-mission {
            font-size: 14px;
            color: rgba(51, 51, 51, 0.8);
            line-height: 1.6;
            margin-bottom: 28px;
            padding: 16px;
            background: rgba(255, 149, 0, 0.08);
            border-radius: 16px;
            border-left: 4px solid #FF9500;
        }

        .start-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, #FF9500 0%, #FFB347 100%);
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 16px;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 12px 24px rgba(255, 149, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 100%);
            pointer-events: none;
            border-radius: 20px 20px 0 0;
        }

        .start-btn:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 20px 40px rgba(255, 149, 0, 0.5),
                0 0 30px rgba(255, 149, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .start-btn:active {
            transform: translateY(0px);
            box-shadow: 0 8px 16px rgba(255, 149, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: rgba(51, 51, 51, 0.6);
            transition: all 0.2s ease;
            padding: 4px;
        }

        .modal-close:hover {
            color: rgba(51, 51, 51, 1);
            transform: rotate(90deg);
        }

        @media (max-width: 480px) {
            .btn-3d {
                height: 120px;
            }

            .btn-icon {
                font-size: 40px;
            }

            .lesson-banner {
                margin-bottom: 30px;
            }

            .buttons-grid {
                gap: 20px;
            }

            .header-text h1 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- Subtle background decoration -->
    <div class="bg-decoration" id="bgDecoration"></div>

    <!-- Header with user profile -->
    <div class="header">
        <div id="userAvatar" class="user-avatar">
            {% if userdb.userpic %}
                <img src="{{ userpic }}" alt="{{ first_name }}" style="width: 100%; height: 100%; border-radius: 16px; object-fit: cover;">
            {% else %}
                {{ userdb.first_name|first|upper }}
            {% endif %}
        </div>
        <div class="header-text">
            <h1>Hi, {{ first_name|default:"User" }}!</h1>
            <p>Learning {{ lang_to_learn|default:"a language" }}</p>
        </div>
    </div>

    <!-- Main content -->
    <div class="container">
        <!-- Lesson Banner -->
        <div class="lesson-banner">
            <div class="lesson-label">Section 1, Unit 1</div>
            <div class="lesson-title">Learn the alphabet</div>
        </div>

        <!-- Winding Path Section -->
        <div class="path-section">
            <div class="path-container">
                <!-- SVG Winding Path -->
                <svg class="path-svg" viewBox="0 0 320 1100" preserveAspectRatio="xMidYMid meet">
                    <defs>
                        <linearGradient id="pathGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color: rgba(255, 200, 0, 0.8); stop-opacity: 1" />
                            <stop offset="100%" style="stop-color: rgba(255, 140, 0, 0.6); stop-opacity: 1" />
                        </linearGradient>
                    </defs>
                    <!-- Winding path -->
                    <path d="M 160 60 Q 80 140 80 200 Q 80 280 160 320 Q 240 360 240 440 Q 240 520 160 560 Q 80 600 80 680 Q 80 760 160 800 Q 240 840 240 920 Q 240 1000 160 1040" 
                          stroke="url(#pathGradient)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>

                <!-- Level Buttons -->
                <div class="levels-container">
                    <!-- Level 1 -->
                    <div class="level-position" style="left: 50%; top: 40px; transform: translateX(-50%);">
                        <button class="level-btn-circle green" onclick="playLevel(1)">
                            <div class="level-number">1</div>
                            <div class="level-btn-text">Start</div>
                        </button>
                    </div>

                    <!-- Level 2 -->
                    <div class="level-position" style="left: 10%; top: 280px;">
                        <button class="level-btn-circle" onclick="playLevel(2)">
                            <div class="level-number">2</div>
                            <div class="level-btn-text">Learn</div>
                        </button>
                    </div>

                    <!-- Level 3 -->
                    <div class="level-position" style="left: 50%; top: 520px; transform: translateX(-50%);">
                        <button class="level-btn-circle blue" onclick="playLevel(3)">
                            <div class="level-number">3</div>
                            <div class="level-btn-text">Master</div>
                        </button>
                    </div>

                    <!-- Level 4 -->
                    <div class="level-position" style="right: 10%; top: 760px;">
                        <button class="level-btn-circle locked" onclick="playLevel(4)">
                            <div class="level-number">🔒</div>
                            <div class="level-btn-text">Next</div>
                        </button>
                    </div>

                    <!-- Level 5 -->
                    <div class="level-position" style="left: 50%; top: 1000px; transform: translateX(-50%);">
                        <button class="level-btn-circle locked" onclick="playLevel(5)">
                            <div class="level-number">🔒</div>
                            <div class="level-btn-text">Expert</div>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Modal -->
    <div class="modal-overlay" id="gameModal">
        <div class="game-modal">
            <button class="modal-close" onclick="closeGameModal()">✕</button>
            <div class="level-badge" id="modalLevelBadge">1</div>
            <h2 class="game-title" id="modalGameTitle">Loading...</h2>
            <div class="game-mission" id="modalGameDescription">Get ready for an amazing learning experience!</div>
            <button class="start-btn" onclick="startGame()">Start Game</button>
        </div>
    </div>

    <!-- Footer Navigation -->
    <div class="footer-nav">
        <button class="nav-btn active" onclick="goToProfile()">
            <div class="nav-icon">👤</div>
            <div class="nav-label">Profile</div>
        </button>
        <button class="nav-btn" onclick="goToChat()">
            <div class="nav-icon">💬</div>
            <div class="nav-label">Chat AI</div>
        </button>
        <button class="nav-btn" onclick="goToCall()">
            <div class="nav-icon">📞</div>
            <div class="nav-label">Random Call</div>
        </button>
    </div>

    <script>
        // User data from Django backend
        const userLevel = parseInt('{{ level }}') || 1;
        const username = '{{ username }}' || 'user';
        let currentSelectedLevel = null;

        // Generate random background stars and shapes
        function generateBackgroundDecoration() {
            const bgContainer = document.getElementById('bgDecoration');
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;

            // Create random stars
            const starCount = Math.min(20, Math.floor(viewportWidth / 100));
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                const sizes = ['small', 'medium', 'large'];
                const randomSize = sizes[Math.floor(Math.random() * sizes.length)];
                star.className = `star ${randomSize}`;
                
                star.style.left = Math.random() * viewportWidth + 'px';
                star.style.top = Math.random() * viewportHeight + 'px';
                star.style.animationDelay = Math.random() * 3 + 's';
                
                bgContainer.appendChild(star);
            }

            // Create floating shapes
            const shapeCount = 3;
            for (let i = 0; i < shapeCount; i++) {
                const shape = document.createElement('div');
                shape.className = 'floating-shape shape-circle';
                
                const size = 40 + Math.random() * 100;
                shape.style.width = size + 'px';
                shape.style.height = size + 'px';
                shape.style.left = Math.random() * viewportWidth + 'px';
                shape.style.top = Math.random() * viewportHeight + 'px';
                shape.style.animationDelay = Math.random() * 8 + 's';
                
                bgContainer.appendChild(shape);
            }
        }

        // Initialize level buttons based on user level
        function initializeLevels() {
            const levelButtons = document.querySelectorAll('.level-btn-circle');
            let highestUnlockedBtn = null;

            levelButtons.forEach((btn, index) => {
                const levelNum = index + 1;
                
                if (levelNum <= userLevel) {
                    // Unlock level
                    btn.classList.remove('locked');
                    highestUnlockedBtn = btn;
                    
                    // Add color to unlocked levels
                    if (levelNum === 1) {
                        btn.classList.add('green');
                    } else if (levelNum === 3) {
                        btn.classList.add('blue');
                    }
                } else {
                    // Lock future levels
                    btn.classList.add('locked');
                    btn.disabled = true;
                }
            });

            // Add "Play Now" tooltip to highest unlocked level
            if (highestUnlockedBtn) {
                const levelPos = highestUnlockedBtn.closest('.level-position');
                const tooltip = document.createElement('div');
                tooltip.className = 'play-now-tooltip';
                tooltip.textContent = '✨ Play Now';
                levelPos.style.position = 'relative';
                levelPos.appendChild(tooltip);
            }
        }

        // Validate level and fetch game data
        async function playLevel(level) {
            if (level > userLevel) {
                alert('Complete previous levels to unlock this one!');
                return;
            }

            console.log('[v0] Level tapped:', level, 'Username:', username);
            currentSelectedLevel = level;

            try {
                const response = await fetch('game_validate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken'),
                    },
                    body: JSON.stringify({
                        level: level,
                        username: username
                    })
                });

                const data = await response.json();
                console.log('[v0] Game data received:', data);

                if (data.status === 'success') {
                    displayGameModal(data);
                } else {
                    alert('Error loading game. Please try again.');
                }
            } catch (error) {
                console.error('[v0] Error:', error);
                alert('Connection error. Please try again.');
            }
        }

        // Display game modal with received data
        function displayGameModal(gameData) {
            document.getElementById('modalLevelBadge').textContent = gameData.level;
            document.getElementById('modalGameTitle').textContent = gameData.title;
            document.getElementById('modalGameDescription').textContent = gameData.description;
            
            const modal = document.getElementById('gameModal');
            modal.classList.add('active');
        }

        // Close game modal
        function closeGameModal() {
            const modal = document.getElementById('gameModal');
            modal.classList.remove('active');
            currentSelectedLevel = null;
        }

        // Start game
        function startGame() {
            if (currentSelectedLevel) {
                console.log('[v0] Starting game for level:', currentSelectedLevel);
                // Redirect to game or start game logic
                alert(`Starting Level ${currentSelectedLevel}!`);
                closeGameModal();
            }
        }

        // Get CSRF token from cookies
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function goToProfile() {
            console.log('[v0] Profile clicked');
            alert('Profile page coming soon!');
        }

        function goToChat() {
            console.log('[v0] Chat clicked');
            alert('AI Chat coming soon!');
        }

        function goToCall() {
            console.log('[v0] Random call clicked');
            alert('Random Call coming soon!');
        }

        // Close modal on outside click
        document.addEventListener('DOMContentLoaded', function() {
            generateBackgroundDecoration();
            initializeLevels();

            // Close modal when clicking outside
            document.getElementById('gameModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeGameModal();
                }
            });
        });
    </script>
</body>
</html>
